  <body class="sidebar-collapsed">
    <aside class="app-sidebar" id="appSidebar" aria-label="侧边栏">
      <div class="app-sidebar__top">
        <div class="sidebar__brand" id="sidebarBrand">
          <img class="sidebar__brand-logo" src="assets/YoooFind.png" alt="YoooFind logo" />
          <span class="sidebar__brand-title sidebar__label">YoooFind</span>
          <button
            type="button"
            class="sidebar__collapse-btn"
            id="sidebarCollapseButton"
            title="折叠侧边栏"
            aria-label="折叠侧边栏"
          >
            <i class="bx bx-chevrons-left"></i>
          </button>
          <button
            type="button"
            class="sidebar__expand-btn"
            id="sidebarExpandButton"
            title="展开侧边栏"
            aria-label="展开侧边栏"
          >
            <i class="bx bx-chevrons-right"></i>
          </button>
        </div>
        <button type="button" class="sidebar__new-chat-btn" id="newChatButton">
          <i class="bx bx-edit-alt"></i>
          <span class="sidebar__label">新建对话</span>
        </button>
      </div>

      <div class="app-sidebar__middle">
        <div class="sidebar__section-title sidebar__label">历史会话</div>
        <div class="sidebar__history" id="sidebarHistory">
          <button type="button" class="sidebar__session is-active" data-session-id="session-1">
            <i class="bx bx-message-rounded-dots sidebar__session-icon"></i>
            <span class="sidebar__session-title">新聊天</span>
          </button>
        </div>
      </div>

      <div class="app-sidebar__bottom">
        <button type="button" class="sidebar__user-card" id="sidebarUserCard">
          <img class="sidebar__user-avatar" id="sidebarUserAvatar" src="assets/profile.png" alt="用户头像" />
          <span class="sidebar__label" id="sidebarUserLabel">登录</span>
        </button>
        <button type="button" class="sidebar__settings-btn" id="sidebarSettingsButton">
          <i class="bx bx-cog"></i>
          <span class="sidebar__label">设置</span>
        </button>
      </div>
    </aside>
    <button type="button" class="sidebar__backdrop" id="sidebarBackdrop" aria-label="关闭侧边栏"></button>

    <nav class="navbar">
      <button class="navbar__button navbar__button--menu" id="sidebarMobileToggle" type="button">
        <i class="bx bx-menu"></i>
      </button>
      <button class="navbar__button" id="themeToggler">
        <i class="bx bx-sun"></i>
      </button>
    </nav>

    <header class="header">
      <div class="header__title">
        <h1 class="header__typing-title" data-full-text="你好！我是YoooFind">
          <span class="header__typing-text">你好！我是YoooFind</span><span class="header__cursor" aria-hidden="true">▌</span>
        </h1>
      </div>
    </header>

    <section class="chats"></section>

    <section class="prompt">
      <form action="#" class="prompt__form" novalidate>
        <div class="prompt__input-wrapper">
          <button
            class="prompt__form-button prompt__form-button--attach"
            id="attachButton"
            type="button"
            aria-label="上传文件"
            title="上传文件和图片"
          >
            <i class="bx bx-plus"></i>
          </button>
          <div class="prompt__attach-menu hide" id="attachMenu">
            <button
              type="button"
              class="prompt__attach-option"
              data-attach-mode="image"
            >
              <i class="bx bx-image-add"></i>
              上传图片
            </button>
            <button
              type="button"
              class="prompt__attach-option"
              data-attach-mode="file"
            >
              <i class="bx bx-file"></i>
              上传文件
            </button>
          </div>
          <input
            id="fileInput"
            class="prompt__file-input"
            type="file"
            multiple
            accept="image/*,.txt,.md,.json,.csv,.js,.ts,.tsx,.go,.py,.java,.c,.cpp,.html,.css,.xml,.yaml,.yml,.pdf"
          />
          <textarea
            placeholder="好久不见..."
            class="prompt__form-input"
            rows="1"
            required
          ></textarea>
          <button class="prompt__form-button" id="sendButton">
            <i class="bx bx-send"></i>
          </button>
          <button
            class="prompt__form-button"
            id="voiceButton"
            type="button"
            aria-label="语音输入"
            title="语音输入"
          >
            <i class="bx bx-microphone"></i>
          </button>
          <div class="prompt__attachments" id="attachmentList"></div>
        </div>
      </form>
    </section>

    <div class="modal-overlay hide" id="authModal" aria-hidden="true">
      <div class="modal-card" role="dialog" aria-modal="true" aria-label="登录或注册">
        <button type="button" class="modal-close-btn" data-close-modal="authModal" aria-label="关闭">
          <i class="bx bx-x"></i>
        </button>
        <h2 class="modal-title">欢迎来到 YoooFind</h2>
        <p class="modal-subtitle">登录后可同步历史会话与个人配置</p>
        <div class="modal-tab-row">
          <button type="button" class="modal-tab-btn is-active" data-auth-mode="login">登录</button>
          <button type="button" class="modal-tab-btn" data-auth-mode="register">注册</button>
        </div>
        <form class="modal-form" id="authForm">
          <label class="modal-field">
            <span>邮箱</span>
            <input id="authEmail" type="email" required placeholder="you@example.com" />
          </label>
          <label class="modal-field">
            <span>密码</span>
            <input id="authPassword" type="password" required minlength="6" placeholder="至少 6 位" />
          </label>
          <button type="submit" class="modal-primary-btn" id="authSubmitButton">登录</button>
        </form>
        <div class="modal-status" id="authStatus"></div>
      </div>
    </div>

    <div class="modal-overlay hide" id="profileModal" aria-hidden="true">
      <div class="modal-card modal-card--wide" role="dialog" aria-modal="true" aria-label="个人信息">
        <button type="button" class="modal-close-btn" data-close-modal="profileModal" aria-label="关闭">
          <i class="bx bx-x"></i>
        </button>
        <h2 class="modal-title">个人信息</h2>
        <div class="profile-head">
          <img class="profile-avatar-preview" id="profileAvatarPreview" src="assets/profile.png" alt="头像预览" />
          <label class="modal-secondary-btn profile-upload-btn">
            上传头像
            <input id="avatarInput" type="file" accept="image/*" />
          </label>
        </div>
        <form class="modal-form" id="profileForm">
          <label class="modal-field">
            <span>昵称</span>
            <input id="profileDisplayName" type="text" maxlength="32" placeholder="用户" />
          </label>
          <label class="modal-field">
            <span>姓名</span>
            <input id="profileFullName" type="text" maxlength="64" placeholder="你的姓名" />
          </label>
          <label class="modal-field">
            <span>个人简述</span>
            <textarea id="profileBio" rows="3" maxlength="300" placeholder="介绍一下自己"></textarea>
          </label>
          <div class="profile-action-row">
            <button type="submit" class="modal-primary-btn">保存资料</button>
            <button type="button" class="modal-secondary-btn" id="logoutButton">退出登录</button>
          </div>
        </form>
        <div class="modal-status" id="profileStatus"></div>
        <section class="profile-usage-card" aria-label="Token 使用统计">
          <h3 class="modal-title profile-usage-title">Token 使用统计</h3>
          <p class="modal-subtitle">可切换查看近30天与历史累计</p>
          <div class="usage-summary" id="usageSummaryText">近30天 0 token · 历史总计 0 token</div>
          <div class="usage-toggle-group" id="usageToggleGroup">
            <button type="button" class="usage-toggle-btn is-active" data-usage-mode="recent30">近30天 Token</button>
            <button type="button" class="usage-toggle-btn" data-usage-mode="alltime">历史累计 Token</button>
          </div>
          <div class="usage-chart-frame">
            <canvas id="usageChartCanvas" width="560" height="380"></canvas>
          </div>
        </section>
      </div>
    </div>
